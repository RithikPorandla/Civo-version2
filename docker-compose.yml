services:
  db:
    build:
      context: ./db
    image: civo/postgis-pgvector:16-3.4
    container_name: civo-db
    environment:
      POSTGRES_USER: civo
      POSTGRES_PASSWORD: civo
      POSTGRES_DB: civo
    ports:
      - "5432:5432"
    volumes:
      - civo_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          pg_isready -U civo -d civo &&
          psql -U civo -d civo -tAc "SELECT 1 FROM pg_extension WHERE extname IN ('postgis','vector') HAVING COUNT(*)=2"
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  civo_pgdata:

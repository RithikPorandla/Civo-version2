# Solar ground-mount scoring config — overrides criterion weights from base config.
# Ground-mount solar has a large footprint (5-40 acres for 1-5MW) and the primary
# regulatory concern under 225 CMR 29.00 is deforestation and prime farmland.
# Grid proximity matters less than for BESS; brownfield bonus is more impactful.

version: "ma-eea-2026-v1-solar"
methodology: "MA EEA Site Suitability, 225 CMR 29.00 — Solar-weighted"
effective_date: "2024-01-01"
last_reviewed: "2026-04-21"
base_config: "ma-eea-2026-v1"

# Weight rationale:
#   grid_alignment:    0.15  (-0.05) — solar can be further from grid; inverter output is flexible
#   biodiversity:      0.20  (same)  — habitat ineligibility unchanged
#   climate_resilience: 0.15 (same)  — flood exposure same risk
#   carbon_storage:    0.20  (+0.05) — deforestation is the leading opposition trigger under §29.00
#   burdens:           0.10  (same)
#   benefits:          0.15  (+0.05) — brownfield/impervious bonus strongly favored for solar
#   agriculture:       0.05  (-0.05) — prime farmland still relevant but less weight than carbon
criteria_weight_overrides:
  grid_alignment:    0.15
  biodiversity:      0.20
  climate_resilience: 0.15
  carbon_storage:    0.20
  burdens:           0.10
  benefits:          0.15
  agriculture:       0.05

buckets:
  suitable_min: 70
  conditional_min: 50

ineligibility_total_cap: 55

generation_storage_project_types:
  - solar_ground_mount
  - solar_canopy
  - solar
  - generation

project_buffer_m:
  solar_ground_mount: 500
  solar_canopy: 100
  default: 500

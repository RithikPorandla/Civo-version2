# MA EEA Site Suitability scoring config.
# Version: ma-eea-2026-v1
# Methodology: 225 CMR 29.00 (2024 Climate Act, G.L. c.21A §30)
# When thresholds or weights change, bump the version string and keep the
# old file so historical reports can re-run under the config they were
# originally scored against.

version: "ma-eea-2026-v1"
methodology: "MA EEA Site Suitability, 225 CMR 29.00"
effective_date: "2024-01-01"
last_reviewed: "2026-04-14"

# Bucket thresholds on the weighted 0-100 total score.
buckets:
  suitable_min: 70          # >=70 -> SUITABLE
  conditional_min: 50       # 50..69 -> CONDITIONALLY SUITABLE
  # <50 -> CONSTRAINED

# Soft ineligibility cap: when a biomap_core or nhesp_priority flag is
# set (overlap >= criteria.biodiversity.ineligibility_min_pct), the
# total score is capped at this ceiling, because 225 CMR 29.06 prohibits
# generation/storage siting in those zones without a waiver.
ineligibility_total_cap: 55

criteria:

  grid_alignment:
    weight: 0.20
    # Distance in meters from parcel centroid to nearest ESMP project or
    # existing substation. Linear interpolation between anchors.
    # Closer = better grid alignment = higher score.
    distance_anchors_m:
      - [0,     10]
      - [500,   10]
      - [2000,   8]
      - [5000,   5]
      - [10000,  2]
      - [15000,  0]
    # A planned-but-unbuilt ESMP project isn't actual grid. Cap proximity
    # credit based on siting_status so rural greenfields stop scoring 10/10
    # just because Eversource drew them on a future-pipeline slide.
    siting_status_caps:
      pending_siting: 4
      planned: 5
      in_permitting: 8
      approved: 10
      under_construction: 10
      in_service: 10
    pending_siting_cap: 4     # legacy; superseded by siting_status_caps but kept for tests
    existing_substation_bonus: 0.5  # +0.5 if within 2km of an existing sub (currently unused)

  climate_resilience:
    weight: 0.15
    # FEMA NFHL — static flood zones covering all flood types (riverine + coastal).
    # More flood exposure = lower score.
    sfha_zones: ["A", "AE", "AO", "AH", "V", "VE"]
    sfha_anchors_pct:
      - [0.0,  10]
      - [0.05,  8]
      - [0.15,  5]
      - [0.30,  2]
      - [0.60,  0]
    # MC-FRM (MA Coastal Flood Risk Model) — forward-looking coastal inundation.
    # Primary scenario/AEP used as the binding coastal constraint. The engine
    # takes min(fema_raw, mcfrm_raw) so inland parcels (0% MC-FRM overlap)
    # are never penalised by the coastal model.
    mcfrm_primary_scenario: "2050"
    mcfrm_primary_aep: "1pct"
    mcfrm_anchors_pct:
      - [0.0,   10]
      - [0.03,   8]   # MC-FRM is spatially precise; even 3% is a real signal
      - [0.10,   5]
      - [0.25,   2]
      - [0.50,   0]

  carbon_storage:
    weight: 0.15
    # PRIMARY: DCR Priority Forests — top-20% carbon storage forests statewide.
    # Used when the dcr_priority_forests table is populated (run ingest/dcr_priority_forests.py).
    # More overlap = greater carbon stock loss risk = lower siting suitability.
    dcr_anchors_pct:
      - [0.00, 10]
      - [0.05,  9]
      - [0.10,  7]
      - [0.25,  4]
      - [0.50,  1]
      - [0.75,  0]
    ineligibility_min_pct: 0.20   # ≥20% DCR overlap triggers carbon_top20 ineligibility flag
    # FALLBACK PROXY: MassGIS 2016 Land Cover forested-cover fraction.
    # Used only when DCR Priority Forests table is empty (not yet ingested).
    forested_cover_codes: [9, 10, 13]
    forest_anchors_pct:
      - [0.0,  10]
      - [0.10,  9]
      - [0.30,  7]
      - [0.60,  3]
      - [0.90,  0]
    proxy_note: >-
      Carbon storage is scored against DCR Priority Forests (top-20% carbon
      statewide) when ingested. Until then, forested-cover fraction from
      MassGIS 2016 is used as a proxy and the criterion is marked data_unavailable.

  biodiversity:
    weight: 0.20
    # Weighted overlap across four layers. Weights inside the criterion
    # MUST sum to 1.0. Weighted overlap is fed through anchor points
    # (not 10*(1-w)) so even small overlap with high-weight layers
    # produces a meaningful deduction — a parcel with 5% BioMap Core
    # overlap has a real biodiversity risk, not a ~9.8/10 score.
    # BioMap Core and NHESP Priority also trigger ineligible_flags when
    # overlap >= ineligibility_min_pct.
    layer_weights:
      biomap_core:       0.50
      nhesp_priority:    0.25
      biomap_cnl:        0.15
      nhesp_estimated:   0.10
    overlap_anchors:
      - [0.00, 10]
      - [0.01,  9]
      - [0.03,  7]
      - [0.05,  5]   # at the 5% ineligibility threshold, raw drops to 5
      - [0.10,  3]
      - [0.25,  1]
      - [0.50,  0]
    ineligibility_min_pct: 0.05   # >=5% overlap with Core/Priority flags ineligible

  burdens:
    weight: 0.10
    # MassEnviroScreen cumulative burden at the block group containing the
    # parcel centroid. Higher burden = lower siting score.
    mes_anchors:
      - [0,    10]
      - [20,    9]
      - [40,    6]
      - [60,    4]
      - [75,    2]    # 75th percentile = Burdened Area MES threshold (2024 Climate Act)
      - [90,    1]
      - [100,   0]
    ej_flag_values: ["Yes", "Yes - Income", "Yes - Minority", "Yes - English Isolation",
                     "Yes - Income, Minority", "Yes - Income, English Isolation",
                     "Yes - Minority, English Isolation",
                     "Yes - Income, Minority, English Isolation"]
    # MA EJ Policy 2020 official thresholds (225 CMR 29.09 / 310 CMR 7.72):
    #   Minority  ≥ 40%  non-white / Hispanic (ej_minority_threshold_pct)
    #   Income    ≤ 65%  of MA MHHI           (burdened_area_income_threshold_pct)
    #   Language  ≥ 25%  limited-English HH   (ej_language_threshold_pct)
    # Source: OEJE EJ Policy 2021; U.S. Census ACS 2020.
    ej_minority_threshold_pct: 0.40
    ej_language_threshold_pct: 0.25
    # 2024 Climate Act Burdened Area income criterion (same threshold as EJ income):
    # Source: U.S. Census Bureau ACS 2024 1-year estimate (table B19013).
    ma_statewide_median_hh_income: 104828
    burdened_area_income_threshold_pct: 0.65
    # Derived threshold: 104828 × 0.65 = $68,138

  benefits:
    weight: 0.10
    # Percent of parcel in MassGIS built-environment cover codes
    # (Impervious = 2, Developed Open Space = 5). Siting on already-
    # developed land is a benefit (brownfield/built-environment bonus).
    built_env_cover_codes: [2, 5]
    built_env_anchors_pct:
      - [0.0,   0]
      - [0.25,  3]
      - [0.50,  6]
      - [0.75,  9]
      - [1.0,  10]

  agriculture:
    weight: 0.10
    # Percent of parcel on NRCS Prime Farmland soils. Siting on prime
    # farmland deducts. FARMLNDCL values treated as "prime":
    #   "All areas are prime farmland"
    #   "Prime farmland if drained"
    #   "Prime farmland if irrigated"
    #   "Prime farmland if protected from flooding..."
    # Statewide-importance class ("Farmland of statewide importance") adds
    # a half-weight penalty.
    prime_farmland_regex: "^(All areas are prime farmland|Prime farmland)"
    statewide_farmland_regex: "^Farmland of statewide importance"
    prime_anchors_pct:
      - [0.0,  10]
      - [0.10,  9]
      - [0.30,  6]
      - [0.50,  2]
      - [0.80,  0]
    statewide_weight: 0.5      # half-counts statewide-importance soils

# Ineligible-area overlay (225 CMR 29.00 Section 29.06).
# When a project_type is 'generation' or 'storage', any of these flagged
# layers produces an ineligible_flag in the report. Infrastructure projects
# can pursue a waiver so we still surface the flag for them but do not
# treat it as a hard block.
ineligibility_layers:
  - biomap_core
  - nhesp_priority
  - article97         # not yet ingested; report will emit data_unavailable
  - carbon_top20      # not yet ingested; report will emit data_unavailable
  - wetland_resource  # approximated via DEP wetlands overlap; over-inclusive
  - state_register    # not yet ingested; report will emit data_unavailable

# Project footprint buffers used for sensitivity criteria
# (biodiversity, flood, carbon, agriculture). Burdens + benefits stay
# at parcel-only geometry because they're parcel-scoped questions
# ("is this block group EJ?", "is this lot already built?").
#
# Rationale: a new substation + associated switchgear + transmission
# tap typically occupies more than a single assessor's parcel, and the
# scoring methodology asks about habitat etc. *in the vicinity* of the
# site, not only within the parcel boundary.
project_buffer_m:
  substation: 1500
  substation_expansion: 800
  substation_rebuild: 2500
  underground_substation: 400
  new_substation: 2000
  new_substation_cip: 2500
  substation_plus_transmission: 3000
  industrial_warehouse: 300
  generic: 500
  default: 500

generation_storage_project_types:
  - generation
  - storage
  - new_substation
  - new_substation_cip
  - substation
  - underground_substation
  - substation_expansion
  - substation_rebuild
  - substation_plus_transmission
  - solar
  - battery_storage

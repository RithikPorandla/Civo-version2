# Civo — Data Sources Index
# ------------------------------------------------------------------
# Single source of truth for the /data-sources page.
# Every dataset that feeds a score, every regulation cited on a report,
# every external dependency, must live here.
#
# Schema
# ------
# id              stable slug, used as the anchor on the public page
# name            human-readable display name
# agency          the organization that publishes / maintains the source
# category        spatial | regulatory | municipal | benchmark | external
# url             primary reference URL (kept live by link_health)
# docket          regulatory docket number (when applicable)
# coverage        geographic / scope description
# used_by         list of criteria, endpoints, or services this feeds
# tables          list of DB tables backing this source (row counts are
#                 summed across the list at request time)
# last_refreshed  ISO date of the most recent ingestion run (manually set)
# last_reviewed   ISO date a human verified the entry (manually set)
# citation_format optional format string used when rendering a citation
# status          ingested | planned | external
# notes           free-form commentary, shown below the entry

metadata:
  schema_version: "1"
  last_reviewed: "2026-04-18"

sources:

